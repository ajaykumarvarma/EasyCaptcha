services:

  # ── EasyCaptcha backend ───────────────────────────────────────────────────
  captcha:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL:        mongodb://mongo:27017
      DB_NAME:            easycaptcha
      # Change this to a strong random secret before deploying!
      # Generate one: python -c "import secrets; print(secrets.token_hex(32))"
      API_SECRET_KEY:     change-me-in-production
      # Restrict to your frontend origin in production, e.g. https://yourdomain.com
      ALLOWED_ORIGINS:    "http://localhost:3000,http://localhost:5173"
      TOKEN_TTL_MINUTES:  "5"
      RATE_LIMIT_PER_MIN: "15"
      CAPTCHA_LENGTH:     "5"
      LOG_LEVEL:          INFO
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s
    restart: unless-stopped

volumes:
  mongo_data:
